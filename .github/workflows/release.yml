name: Release

# Publishes to npm with provenance via Trusted Publishing (OIDC) — no
# long-lived npm token. Requires the Trusted Publisher to be configured on
# npmjs.com for @chartobserver/mcp-server pointing at this repo + workflow.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"
      # Trusted Publishing needs npm >= 11.5
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PKG_VERSION" >&2
            exit 1
          fi
      - run: npm publish --provenance --access public
